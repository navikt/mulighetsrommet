name: POAO-frontend (arbeidsmarkedstiltak-flate)

on:
  push:
    paths:
      - .github/workflows/arbeidsmarkedstiltak-flate-container.yaml
      - frontend/arbeidsmarkedstiltak-flate/.nais/**
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment
        required: true
        default: dev
        options:
          - dev
          - dev_and_prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint
        uses: ./.github/actions/lint-yaml
        with:
          path: frontend/arbeidsmarkedstiltak-flate/.nais

  deploy-nav-dev:
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write # Needed for `nais/deploy/actions/deploy`
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy (dev)
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: frontend/arbeidsmarkedstiltak-flate/.nais/nais-dev.yaml

  deploy-nav-prod:
    runs-on: ubuntu-latest
    needs: [deploy-nav-dev]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev_and_prod'
    permissions:
      id-token: write # Needed for `nais/deploy/actions/deploy`
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy (prod)
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: frontend/arbeidsmarkedstiltak-flate/.nais/nais-prod.yaml
