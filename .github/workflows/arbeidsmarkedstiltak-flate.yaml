name: CI/CD (arbeidsmarkedstiltak-flate)

on:
  push:
    paths:
      - .github/workflows/arbeidsmarkedstiltak-flate.yaml
      - package.json
      - pnpm-lock.yaml
      - turbo.json
      - frontend/frontend-common/**
      - frontend/arbeidsmarkedstiltak-api-client/**
      - frontend/arbeidsmarkedstiltak-flate/**
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment
        required: true
        default: dev
        options:
          - dev
          - dev_and_prod

permissions:
  id-token: "write" # Used to authenticate with Google Cloud (through cdn-upload)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TZ: Europe/Amsterdam

jobs:
  playwright-version:
    name: Get playwright version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend/arbeidsmarkedstiltak-flate
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: get-version
        run: echo "version=$(cat package.json | jq -r '.devDependencies.playwright' | sed -e 's/^[\^\~]//')" >> "$GITHUB_OUTPUT"

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: playwright-version
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.playwright-version.outputs.version }}-jammy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Test
        run: npx turbo run lint typecheck test playwright --filter=@arbeidsmarkedstiltak/flate

  deploy-modia-dev:
    name: Deploy (modia-dev)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build:modia --filter=@arbeidsmarkedstiltak/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/dev/arbeidsmarkedstiltak-modia/dist
          VITE_FARO_URL: https://telemetry.ekstern.dev.nav.no/collect
          VITE_PORTEN_URL: https://jira.adeo.no/plugins/servlet/desk/portal/541/create/1401
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/arbeidsmarkedstiltak-flate/dist
          destination: dev/arbeidsmarkedstiltak-modia
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/dev/arbeidsmarkedstiltak-modia/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"

  deploy-modia-prod:
    name: Deploy (modia-prod)
    runs-on: ubuntu-latest
    needs: [deploy-modia-dev]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev_and_prod'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build:modia --filter=@arbeidsmarkedstiltak/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/prod/arbeidsmarkedstiltak-modia/dist
          VITE_FARO_URL: https://telemetry.nav.no/collect
          VITE_PORTEN_URL: https://jira.adeo.no/plugins/servlet/desk/portal/541/create/1401
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/arbeidsmarkedstiltak-flate/dist
          destination: prod/arbeidsmarkedstiltak-modia
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/prod/arbeidsmarkedstiltak-modia/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"

  deploy-nav-dev:
    name: Deploy (nav-dev)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build:nav --filter=@arbeidsmarkedstiltak/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/dev/arbeidsmarkedstiltak-nav/dist
          VITE_FARO_URL: https://telemetry.ekstern.dev.nav.no/collect
          VITE_PORTEN_URL: https://jira.adeo.no/plugins/servlet/desk/portal/541/create/5406
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/arbeidsmarkedstiltak-flate/dist
          destination: dev/arbeidsmarkedstiltak-nav
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/dev/arbeidsmarkedstiltak-nav/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"

  deploy-nav-prod:
    name: Deploy (nav-prod)
    runs-on: ubuntu-latest
    needs: [deploy-nav-dev]
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev_and_prod'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build:nav --filter=@arbeidsmarkedstiltak/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/prod/arbeidsmarkedstiltak-nav/dist
          VITE_FARO_URL: https://telemetry.nav.no/collect
          VITE_PORTEN_URL: https://jira.adeo.no/plugins/servlet/desk/portal/541/create/5406
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/arbeidsmarkedstiltak-flate/dist
          destination: prod/arbeidsmarkedstiltak-nav
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/prod/arbeidsmarkedstiltak-nav/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"
