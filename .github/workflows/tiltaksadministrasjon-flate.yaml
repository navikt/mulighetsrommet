name: CI/CD (tiltaksadministrasjon-flate)

on:
  push:
    paths:
      - .github/workflows/tiltaksadministrasjon-flate.yaml
      - package.json
      - pnpm-lock.yaml
      - turbo.json
      - frontend/frontend-common/**
      - frontend/tiltaksadministrasjon-api-client/**
      - frontend/tiltaksadministrasjon-flate/**
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment
        required: true
        default: dev
        options:
          - dev
          - dev_and_prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TZ: Europe/Amsterdam

jobs:
  playwright-version:
    name: Get playwright version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend/tiltaksadministrasjon-flate
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: get-version
        run: echo "version=$(cat package.json | jq -r '.devDependencies.playwright' | sed -e 's/^[\^\~]//')" >> "$GITHUB_OUTPUT"

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: playwright-version
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.playwright-version.outputs.version }}-jammy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Test
        run: npx turbo run lint typecheck test --filter=@tiltaksadministrasjon/flate

      - name: Playwright test
        run: npx turbo run playwright --filter=@tiltaksadministrasjon/flate

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/tiltaksadministrasjon-flate/playwright-report/
          retention-days: 30

  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      id-token: "write" # Used to authenticate with Google Cloud (through cdn-upload)
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build --filter=@tiltaksadministrasjon/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/dev/tiltaksadministrasjon-flate/dist
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/tiltaksadministrasjon-flate/dist
          destination: dev/tiltaksadministrasjon-flate
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/dev/tiltaksadministrasjon-flate/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"

  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: [ci, deploy-dev]
    permissions:
      id-token: "write" # Used to authenticate with Google Cloud (through cdn-upload)
    if: github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev_and_prod'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build
        run: npx turbo run build --filter=@tiltaksadministrasjon/flate
        env:
          VITE_BASE: https://cdn.nav.no/team-mulighetsrommet/prod/tiltaksadministrasjon-flate/dist
      - name: Upload to Nav CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        with:
          team: team-mulighetsrommet
          source: frontend/tiltaksadministrasjon-flate/dist
          destination: prod/tiltaksadministrasjon-flate
      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update gs://${BUCKET_NAME}/team-mulighetsrommet/prod/tiltaksadministrasjon-flate/dist/asset-manifest.json --cache-control="public, max-age=120, stale-while-revalidate=7200"
