  /api/arrangorflate/{orgnr}/features:
    get:
      tags:
      - FeatureToggle
      operationId: getFeatureToggle
      parameters:
      - name: orgnr
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      - name: feature
        in: query
        required: true
        deprecated: false
        explode: false
        schema:
          $ref: "#/components/schemas/FeatureToggle"
      - name: tiltakskoder
        in: query
        required: false
        deprecated: false
        explode: true
        schema:
          type: array
          items:
            $ref: "#/components/schemas/Tiltakskode"
      responses:
        "200":
          description: Om feature er på eller ikke
          headers: {}
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: En feil har oppstått
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      deprecated: false
components:
  schemas:
    OpenApiVersion:
      type: number
      enum:
        - 1
    ArrangorflateFilterType:
      type: string
      enum:
      - AKTIVE
      - HISTORISKE
    ArrangorflateTiltakFilter.OrderBy:
      type: string
      enum:
      - TILTAK
      - ARRANGOR
      - START_DATO
      - SLUTT_DATO
      - STATUS
    ArrangorflateFilterDirection:
      type: string
      enum:
      - ASC
      - DESC
    PaginationSummary:
      type: object
      properties:
        totalCount:
          type: integer
          format: int32
          default: null
        pageSize:
          type: integer
          format: int32
          default: null
        totalPages:
          type: integer
          format: int32
          default: null
      required:
      - pageSize
      - totalCount
      - totalPages
    ArrangorInnsendingRadDto:
      type: object
      properties:
        gjennomforingId:
          type: string
          format: uuid
          default: null
        utbetalingId:
          type:
          - "null"
          - string
          format: uuid
          default: null
        arrangorNavn:
          type: string
          default: null
        organisasjonsnummer:
          type: string
          default: null
        tiltakstypeNavn:
          type: string
          default: null
        tiltakNavn:
          type: string
          default: null
        lopenummer:
          type: string
          default: null
        startDato:
          type: string
          format: date
          default: null
        sluttDato:
          type:
          - "null"
          - string
          format: date
          default: null
        belop:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/ValutaBelop"
        type:
          type:
          - "null"
          - string
          default: null
        status:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/ArrangorflateUtbetalingStatus"
      required:
      - arrangorNavn
      - belop
      - gjennomforingId
      - lopenummer
      - organisasjonsnummer
      - sluttDato
      - startDato
      - status
      - tiltakNavn
      - tiltakstypeNavn
      - type
      - utbetalingId
    ValutaBelop:
      type: object
      properties:
        belop:
          type: integer
          format: int32
          default: null
        valuta:
          $ref: "#/components/schemas/Valuta"
      required:
      - belop
      - valuta
    Valuta:
      type: string
      enum:
      - NOK
      - SEK
    ArrangorflateUtbetalingStatus:
      type: string
      enum:
      - KLAR_FOR_GODKJENNING
      - BEHANDLES_AV_NAV
      - UTBETALT
      - UBEHANDLET_FORSLAG
      - OVERFORT_TIL_UTBETALING
      - DELVIS_UTBETALT
      - AVBRUTT
    PaginatedResponse_ArrangorInnsendingRadDto:
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/PaginationSummary"
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArrangorInnsendingRadDto"
          default: null
      required:
      - data
      - pagination
    ProblemDetail:
      type: object
      additionalProperties: {}
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
      - detail
      - status
      - title
      - type
    OpprettKravVeiviserStegDto:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/OpprettKravVeiviserSteg"
        navn:
          type: string
          default: null
        order:
          type: integer
          format: int32
          default: null
      required:
      - navn
      - order
      - type
    OpprettKravVeiviserSteg:
      type: string
      enum:
      - INFORMASJON
      - DELTAKERLISTE
      - UTBETALING
      - VEDLEGG
      - OPPSUMMERING
    OpprettKravInnsendingSteg:
      type: object
      properties:
        guidePanel:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/GuidePanelType"
        definisjonsListe:
          type: array
          items:
            $ref: "#/components/schemas/LabeledDataElement"
          default: null
        tilsagn:
          type: array
          items:
            $ref: "#/components/schemas/ArrangorflateTilsagnDto"
          default: null
        datoVelger:
          $ref: "#/components/schemas/DatoVelger"
      required:
      - datoVelger
      - definisjonsListe
      - guidePanel
      - tilsagn
    GuidePanelType:
      type: string
      enum:
      - INVESTERING_VTA_AFT
      - TIMESPRIS
      - AVTALT_PRIS
    LabeledDataElement:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LabeledDataElementType"
        label:
          type: string
          default: null
        value:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/DataElement"
      required:
      - label
      - type
      - value
    LabeledDataElementType:
      type: string
      enum:
      - INLINE
      - MULTILINE
    DataElement:
      anyOf:
      - $ref: "#/components/schemas/DATA_ELEMENT_LINK"
      - $ref: "#/components/schemas/DATA_ELEMENT_MATH_OPERATOR"
      - $ref: "#/components/schemas/DATA_ELEMENT_MONEY_AMOUNT"
      - $ref: "#/components/schemas/DATA_ELEMENT_MULTI_LINK_MODAL"
      - $ref: "#/components/schemas/DATA_ELEMENT_PERIODE"
      - $ref: "#/components/schemas/DATA_ELEMENT_STATUS"
      - $ref: "#/components/schemas/DATA_ELEMENT_TEXT"
      discriminator:
        propertyName: type
        mapping:
          DATA_ELEMENT_LINK: "#/components/schemas/DATA_ELEMENT_LINK"
          DATA_ELEMENT_MATH_OPERATOR: "#/components/schemas/DATA_ELEMENT_MATH_OPERATOR"
          DATA_ELEMENT_MONEY_AMOUNT: "#/components/schemas/DATA_ELEMENT_MONEY_AMOUNT"
          DATA_ELEMENT_MULTI_LINK_MODAL: "#/components/schemas/DATA_ELEMENT_MULTI_LINK_MODAL"
          DATA_ELEMENT_PERIODE: "#/components/schemas/DATA_ELEMENT_PERIODE"
          DATA_ELEMENT_STATUS: "#/components/schemas/DATA_ELEMENT_STATUS"
          DATA_ELEMENT_TEXT: "#/components/schemas/DATA_ELEMENT_TEXT"
    DATA_ELEMENT_LINK:
      type: object
      properties:
        text:
          type: string
          default: null
        href:
          type: string
          default: null
        digest:
          type: string
          default: null
      required:
      - digest
      - href
      - text
    DATA_ELEMENT_MATH_OPERATOR:
      type: object
      properties:
        operator:
          $ref: "#/components/schemas/DataElement.MathOperator.Type"
      required:
      - operator
    DataElement.MathOperator.Type:
      type: string
      enum:
      - plus
      - minus
      - multiply
      - divide
      - equals
    DATA_ELEMENT_MONEY_AMOUNT:
      type: object
      properties:
        value:
          type:
          - "null"
          - string
          default: null
        currency:
          type: string
          default: null
      required:
      - currency
      - value
    DATA_ELEMENT_MULTI_LINK_MODAL:
      type: object
      properties:
        buttonText:
          type: string
          default: null
        modalContent:
          $ref: "#/components/schemas/DataElement.MultiLinkModal.ModalContent"
      required:
      - buttonText
