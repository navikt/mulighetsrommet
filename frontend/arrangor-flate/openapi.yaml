        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvbrytUtbetaling"
        required: false
      responses:
        "200":
          description: Utbetaling ble regenerert
          headers: {}
        default:
