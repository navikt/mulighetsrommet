components:
  schemas:
    OpenApiVersion:
      type: number
      enum:
        - 1
    LagretFilterType:
      type: string
      enum:
      - AVTALE
      - GJENNOMFORING
      - GJENNOMFORING_MODIA
      - OPPGAVE
      - INNSENDING
    JsonElement:
      type: object
      properties: {}
    LagretFilter:
      type: object
      properties:
        id:
          type: string
          format: uuid
          default: null
        navn:
          type: string
          default: null
        type:
          $ref: "#/components/schemas/LagretFilterType"
        filter:
          $ref: "#/components/schemas/JsonElement"
        isDefault:
          type: boolean
          default: null
        sortOrder:
          type: integer
          format: int32
          default: null
      required:
      - filter
      - id
      - isDefault
      - navn
      - sortOrder
      - type
    ProblemDetail:
      type: object
      additionalProperties: {}
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
      - detail
      - status
      - title
      - type
    GetBrukerRequest:
      type: object
      properties:
        norskIdent:
          type: string
          default: null
      required:
      - norskIdent
    Innsatsgruppe:
      type: string
      enum:
      - GODE_MULIGHETER
      - TRENGER_VEILEDNING
      - TRENGER_VEILEDNING_NEDSATT_ARBEIDSEVNE
      - JOBBE_DELVIS
      - LITEN_MULIGHET_TIL_A_JOBBE
    NavEnhetDto:
      type: object
      properties:
        navn:
          type: string
          default: null
        enhetsnummer:
          type: string
          default: null
        type:
          $ref: "#/components/schemas/NavEnhetType"
        overordnetEnhet:
          type:
          - "null"
          - string
          default: null
      required:
      - enhetsnummer
      - navn
      - overordnetEnhet
      - type
    NavEnhetType:
      type: string
      enum:
      - KO
      - FYLKE
      - TILTAK
      - AAREG
      - ALS
      - ARK
      - DIR
      - DOKSENTER
      - EKSTERN
      - FORVALTNING
      - FPY
      - HELFO
      - HMS
      - INNKREV
      - INTRO
      - IT
      - KLAGE
      - KONTAKT
      - KONTROLL
      - LOKAL
      - OKONOMI
      - OTENESTE
      - OPPFUTLAND
      - OTENESE
      - RIKSREV
      - ROBOT
      - ROL
      - TILLIT
      - UTLAND
      - YTA
    ManuellStatusDto:
      type: object
      properties:
        erUnderManuellOppfolging:
          type: boolean
          default: null
        krrStatus:
          $ref: "#/components/schemas/KrrStatus"
      required:
      - erUnderManuellOppfolging
      - krrStatus
    KrrStatus:
      type: object
      properties:
        kanVarsles:
          type: boolean
          default: null
        erReservert:
          type: boolean
          default: null
      required:
      - erReservert
      - kanVarsles
    BrukerdataVarsel:
      type: string
      enum:
      - LOKAL_OPPFOLGINGSENHET
      - BRUKER_IKKE_UNDER_OPPFOLGING
      - BRUKER_UNDER_OPPFOLGING_MEN_MANGLER_14A_VEDTAK
    Brukerdata:
      type: object
      properties:
        fnr:
          type: string
          default: null
        innsatsgruppe:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/Innsatsgruppe"
        enheter:
          type: array
          items:
            $ref: "#/components/schemas/NavEnhetDto"
          default: null
        fornavn:
          type:
          - "null"
          - string
          default: null
        manuellStatus:
          $ref: "#/components/schemas/ManuellStatusDto"
        erUnderOppfolging:
