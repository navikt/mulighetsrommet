apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: tilskudd.utbetaling-v1
  namespace: team-mulighetsrommet
  labels:
    team: team-mulighetsrommet
spec:
  pool: nav-prod
  config:
    cleanupPolicy: compact,delete
    minimumInSyncReplicas: 2
    partitions: 2
    replication: 3
    # 90 days retention (24 h * 90 d)
    retentionHours: 2160
  acl:
    - team: team-mulighetsrommet
      application: mulighetsrommet-api
      access: readwrite
    - team: team-mulighetsrommet
      application: mulighetsrommet-kafka-manager
      access: read
    - team: helved
      application: abetal
      access: read
    - team: helved
      application: peisschtappern
      access: read
