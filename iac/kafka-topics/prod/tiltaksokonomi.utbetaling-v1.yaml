apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: tiltaksokonomi.utbetaling-v1
  namespace: team-mulighetsrommet
  labels:
    team: team-mulighetsrommet
spec:
  pool: nav-prod
  config:
    cleanupPolicy: compact
    minimumInSyncReplicas: 2
    partitions: 2
    replication: 3
  acl:
    - team: team-mulighetsrommet
      application: tiltaksokonomi
      access: readwrite
    - team: team-mulighetsrommet
      application: mulighetsrommet-kafka-manager
      access: read
    - team: helved
      application: abetal
      access: read
    - team: helved
      application: peisschtappern
      access: read
