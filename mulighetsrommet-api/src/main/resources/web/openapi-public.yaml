openapi: 3.1.0
info:
  title: API
  version: latest
externalDocs:
  url: /
servers: []
tags: []
paths:
  /api/v2/tiltaksgjennomforinger/{id}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingV2
      parameters:
      - name: id
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Gjennomføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiltaksgjennomforingV2Dto"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/tiltaksgjennomforinger/id/{arenaId}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingId
      parameters:
      - name: arenaId
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Id til tiltaksgjennomføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeArenaIdForIdResponse"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/tiltaksgjennomforinger/arenadata/{id}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingArenadata
      parameters:
      - name: id
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Arenadata for tiltaksgjennføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiltaksgjennomforingArenaDataDto"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/arrangor/hovedenhet/sok/{term}:
    get:
      tags:
      - ""
      operationId: sokHovedenhet
      parameters:
      - name: term
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Liste av hovedenheter
          headers: {}
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrregHovedenhetDto"
        "404":
          description: Hovedenheter ble ikke funnet
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: "Søket er blankt, eller bedriften er fjernet av juridiske å\
            rsaker fra Brreg"
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal server error ved kall mot Brreg
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      deprecated: false
  /api/v1/arrangor/hovedenhet/{orgnr}/underenheter:
    get:
      tags:
      - ""
      operationId: hentUnderenheter
      parameters:
      - name: orgnr
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Liste av underenheter
          headers: {}
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrregUnderenhetDto"
        "404":
          description: Fant ikke bedrift med gitt orgnr i Brreg
          headers: {}
        "400":
          description: Fjernet av juridiske årsaker fra Brreg
          headers: {}
        "500":
          description: Feil oppstod ved henting av underenheter fra Brreg
          headers: {}
      deprecated: false
components:
  schemas:
    OpenApiVersion:
      type: number
      enum:
        - 1
    TiltaksgjennomforingV2.Enkeltplass:
      type: object
      properties:
        id:
          type: string
          format: uuid
        opprettetTidspunkt:
          type: string
          format: date-time
        oppdatertTidspunkt:
          type: string
          format: date-time
        tiltakskode:
          $ref: "#/components/schemas/Tiltakskode"
        arrangor:
          $ref: "#/components/schemas/TiltaksgjennomforingV2Dto.Arrangor"
      required:
      - arrangor
      - id
      - oppdatertTidspunkt
      - opprettetTidspunkt
      - tiltakskode
    Tiltakskode:
      type: string
      enum:
      - ARBEIDSFORBEREDENDE_TRENING
      - ARBEIDSRETTET_REHABILITERING
      - AVKLARING
      - DIGITALT_OPPFOLGINGSTILTAK
      - JOBBKLUBB
      - OPPFOLGING
      - VARIG_TILRETTELAGT_ARBEID_SKJERMET
      - ARBEIDSMARKEDSOPPLAERING
      - ENKELTPLASS_ARBEIDSMARKEDSOPPLAERING
      - ENKELTPLASS_FAG_OG_YRKESOPPLAERING
      - FAG_OG_YRKESOPPLAERING
      - GRUPPE_ARBEIDSMARKEDSOPPLAERING
      - GRUPPE_FAG_OG_YRKESOPPLAERING
      - HOYERE_UTDANNING
      - HOYERE_YRKESFAGLIG_UTDANNING
      - NORSKOPPLAERING_GRUNNLEGGENDE_FERDIGHETER_FOV
      - STUDIESPESIALISERING
    TiltaksgjennomforingV2Dto.Arrangor:
      type: object
      properties:
        organisasjonsnummer:
          type: string
      required:
      - organisasjonsnummer
    TiltaksgjennomforingV2.Gruppe:
      type: object
      properties:
        id:
          type: string
          format: uuid
        opprettetTidspunkt:
          type: string
          format: date-time
        oppdatertTidspunkt:
          type: string
          format: date-time
        tiltakskode:
          $ref: "#/components/schemas/Tiltakskode"
        arrangor:
          $ref: "#/components/schemas/TiltaksgjennomforingV2Dto.Arrangor"
        navn:
          type: string
        startDato:
          type: string
          format: date
        sluttDato:
          type:
          - "null"
          - string
          format: date
        status:
          $ref: "#/components/schemas/GjennomforingStatusType"
        oppstart:
          $ref: "#/components/schemas/GjennomforingOppstartstype"
        pameldingType:
          $ref: "#/components/schemas/GjennomforingPameldingType"
        tilgjengeligForArrangorFraOgMedDato:
          type:
          - "null"
          - string
          format: date
        apentForPamelding:
          type: boolean
        antallPlasser:
          type: integer
          format: int32
        deltidsprosent:
          type: number
          format: double
        oppmoteSted:
          type:
          - "null"
          - string
      required:
      - antallPlasser
      - apentForPamelding
      - arrangor
      - deltidsprosent
      - id
      - navn
      - oppdatertTidspunkt
      - oppmoteSted
      - opprettetTidspunkt
      - oppstart
      - pameldingType
      - sluttDato
      - startDato
      - status
      - tilgjengeligForArrangorFraOgMedDato
      - tiltakskode
    GjennomforingStatusType:
      type: string
      enum:
      - GJENNOMFORES
      - AVSLUTTET
      - AVBRUTT
      - AVLYST
    GjennomforingOppstartstype:
      type: string
      enum:
      - LOPENDE
      - FELLES
      - ENKELTPLASS
    GjennomforingPameldingType:
      type: string
      enum:
      - DIREKTE_VEDTAK
      - TRENGER_GODKJENNING
    TiltaksgjennomforingV2Dto:
      anyOf:
      - $ref: "#/components/schemas/TiltaksgjennomforingV2.Enkeltplass"
      - $ref: "#/components/schemas/TiltaksgjennomforingV2.Gruppe"
      discriminator:
        propertyName: type
        mapping:
          TiltaksgjennomforingV2.Enkeltplass: "#/components/schemas/TiltaksgjennomforingV2.Enkeltplass"
          TiltaksgjennomforingV2.Gruppe: "#/components/schemas/TiltaksgjennomforingV2.Gruppe"
    ExchangeArenaIdForIdResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
      - id
    TiltaksgjennomforingArenaDataDto:
      type: object
      properties:
        opprettetAar:
          type: integer
          format: int32
        lopenr:
          type: integer
          format: int32
      required:
      - lopenr
      - opprettetAar
    BrregHovedenhetDto:
      type: object
      properties:
        organisasjonsnummer:
          type: string
        organisasjonsform:
          type: string
        navn:
          type: string
        postadresse:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/BrregAdresse"
        forretningsadresse:
          oneOf:
          - type: "null"
          - $ref: "#/components/schemas/BrregAdresse"
        overordnetEnhet:
          type:
          - "null"
          - string
      required:
      - forretningsadresse
      - navn
      - organisasjonsform
      - organisasjonsnummer
      - overordnetEnhet
      - postadresse
    BrregAdresse:
      type: object
      properties:
        landkode:
          type:
          - "null"
          - string
        postnummer:
          type:
          - "null"
          - string
        poststed:
          type:
          - "null"
          - string
        adresse:
          type:
          - "null"
          - array
          items:
            type: string
      required:
      - adresse
      - landkode
      - postnummer
      - poststed
    ProblemDetail:
      type: object
      additionalProperties: {}
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
      - detail
      - status
      - title
      - type
    BrregUnderenhetDto:
      type: object
      properties:
        organisasjonsnummer:
          type: string
        organisasjonsform:
          type: string
        navn:
          type: string
        overordnetEnhet:
          type: string
      required:
      - navn
      - organisasjonsform
      - organisasjonsnummer
      - overordnetEnhet
  examples: {}
webhooks: {}
