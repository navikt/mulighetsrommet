openapi: 3.1.0
info:
  title: API
  version: latest
externalDocs:
  url: /
servers: []
tags: []
paths:
  /api/v2/tiltaksgjennomforinger/{id}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingV2
      parameters:
      - name: id
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Gjennomføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiltaksgjennomforingV2Dto"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/tiltaksgjennomforinger/id/{arenaId}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingId
      parameters:
      - name: arenaId
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Id til tiltaksgjennomføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeArenaIdForIdResponse"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/tiltaksgjennomforinger/arenadata/{id}:
    get:
      tags:
      - Tiltaksgjennomforing
      operationId: getTiltaksgjennomforingArenadata
      parameters:
      - name: id
        in: path
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Arenadata for tiltaksgjennføringen
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiltaksgjennomforingArenaDataDto"
        "404":
          description: Gjennomføringen ble ikke funnet
          headers: {}
      deprecated: false
  /api/v1/arrangor/underenhet:
    get:
      tags:
      - Arrangor
      description: Søk etter unrderenhet på orgnr eller navn
      operationId: sokUnderenhet
      parameters:
      - name: sok
        in: query
        required: true
        deprecated: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Liste med underenheter
          headers: {}
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrregUnderenhetDto"
        "400":
          description: Søket er blankt
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal server error ved kall mot Brreg
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        default:
          description: Problem details
          headers: {}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      deprecated: false
components:
  schemas:
    OpenApiVersion:
      type: number
      enum:
        - 1
    TiltaksgjennomforingV2.Enkeltplass:
      type: object
      properties:
        id:
          type: string
          format: uuid
        opprettetTidspunkt:
          type: string
          format: date-time
        oppdatertTidspunkt:
          type: string
          format: date-time
        tiltakskode:
          $ref: "#/components/schemas/Tiltakskode"
        arrangor:
          $ref: "#/components/schemas/TiltaksgjennomforingV2Dto.Arrangor"
        status:
          $ref: "#/components/schemas/GjennomforingStatusType"
      required:
      - arrangor
      - id
      - oppdatertTidspunkt
      - opprettetTidspunkt
      - status
      - tiltakskode
    Tiltakskode:
      type: string
      enum:
      - ARBEIDSRETTET_REHABILITERING
      - AVKLARING
      - DIGITALT_OPPFOLGINGSTILTAK
      - JOBBKLUBB
      - OPPFOLGING
      - ARBEIDSFORBEREDENDE_TRENING
      - VARIG_TILRETTELAGT_ARBEID_SKJERMET
      - TILPASSET_JOBBSTOTTE
      - ARBEIDSMARKEDSOPPLAERING
      - ENKELTPLASS_ARBEIDSMARKEDSOPPLAERING
      - ENKELTPLASS_FAG_OG_YRKESOPPLAERING
      - FAG_OG_YRKESOPPLAERING
      - GRUPPE_ARBEIDSMARKEDSOPPLAERING
      - GRUPPE_FAG_OG_YRKESOPPLAERING
      - HOYERE_UTDANNING
      - HOYERE_YRKESFAGLIG_UTDANNING
      - NORSKOPPLAERING_GRUNNLEGGENDE_FERDIGHETER_FOV
      - STUDIESPESIALISERING
      - INDIVIDUELL_JOBBSTOTTE
      - INDIVIDUELL_JOBBSTOTTE_UNG
      - ARBEID_MED_STOTTE
      - ARBEIDSTRENING
      - MIDLERTIDIG_LONNSTLSKUDD
      - VARIG_LONNSTILSKUD
      - MENTOR
      - INKLUDERINGSTILSKUD
      - SOMMERJOBB
      - VTAO
      - FIREARIG_LONNSTILSUDD
    TiltaksgjennomforingV2Dto.Arrangor:
      type: object
      properties:
        organisasjonsnummer:
          type: string
      required:
      - organisasjonsnummer
    GjennomforingStatusType:
      type: string
      enum:
      - GJENNOMFORES
      - AVSLUTTET
      - AVBRUTT
      - AVLYST
    TiltaksgjennomforingV2.Gruppe:
      type: object
      properties:
        id:
          type: string
          format: uuid
        opprettetTidspunkt:
          type: string
          format: date-time
        oppdatertTidspunkt:
          type: string
          format: date-time
        tiltakskode:
          $ref: "#/components/schemas/Tiltakskode"
        arrangor:
          $ref: "#/components/schemas/TiltaksgjennomforingV2Dto.Arrangor"
        status:
          $ref: "#/components/schemas/GjennomforingStatusType"
        navn:
          type: string
        startDato:
          type: string
          format: date
        sluttDato:
          type:
          - "null"
          - string
          format: date
        oppstart:
          $ref: "#/components/schemas/GjennomforingOppstartstype"
        pameldingType:
          $ref: "#/components/schemas/GjennomforingPameldingType"
        tilgjengeligForArrangorFraOgMedDato:
          type:
          - "null"
          - string
          format: date
        apentForPamelding:
          type: boolean
        antallPlasser:
          type: integer
          format: int32
        deltidsprosent:
          type: number
          format: double
        oppmoteSted:
          type:
          - "null"
          - string
      required:
      - antallPlasser
      - apentForPamelding
      - arrangor
      - deltidsprosent
      - id
      - navn
      - oppdatertTidspunkt
      - oppmoteSted
      - opprettetTidspunkt
      - oppstart
      - pameldingType
      - sluttDato
      - startDato
      - status
      - tilgjengeligForArrangorFraOgMedDato
      - tiltakskode
    GjennomforingOppstartstype:
      type: string
      enum:
      - LOPENDE
      - FELLES
      - ENKELTPLASS
    GjennomforingPameldingType:
      type: string
      enum:
      - DIREKTE_VEDTAK
      - TRENGER_GODKJENNING
    TiltaksgjennomforingV2Dto:
      anyOf:
      - $ref: "#/components/schemas/TiltaksgjennomforingV2.Enkeltplass"
      - $ref: "#/components/schemas/TiltaksgjennomforingV2.Gruppe"
      discriminator:
        propertyName: type
        mapping:
          TiltaksgjennomforingV2.Enkeltplass: "#/components/schemas/TiltaksgjennomforingV2.Enkeltplass"
          TiltaksgjennomforingV2.Gruppe: "#/components/schemas/TiltaksgjennomforingV2.Gruppe"
    ExchangeArenaIdForIdResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
      - id
    TiltaksgjennomforingArenaDataDto:
      type: object
      properties:
        opprettetAar:
          type: integer
          format: int32
        lopenr:
          type: integer
          format: int32
      required:
      - lopenr
      - opprettetAar
    BrregUnderenhetDto:
      type: object
      properties:
        organisasjonsnummer:
          type: string
        organisasjonsform:
          type: string
        navn:
          type: string
        overordnetEnhet:
          type: string
      required:
      - navn
      - organisasjonsform
      - organisasjonsnummer
      - overordnetEnhet
    ProblemDetail:
      type: object
      additionalProperties: {}
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
      - detail
      - status
      - title
      - type
  examples: {}
webhooks: {}
